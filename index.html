
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <linearGradient id="ouro" x1="0%" y1="0%" x2="100%" y2="100%">

      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />

    <filter id="sombra" x="-10%" y="-10%" width="120%" height="120%">

    <text x="150" y="700" font-family="serif" font-size="50" fill="#fff">♫</text>

  <rect x="200" y="380" width="400" height="60" rx="8" fill="#1e3a5f" stroke="url(#ouro)" stroke-width="1.5" />

  <text x="400" y="480" font-family="Georgia, serif" font-size="20" fill="#D4AF37" text-anchor="middle" font-weight="bold">Tarsis Iraldes</text>
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="14" fill="#cccccc" text-anchor="middle">Cantor e Músico</text>

  <text x="400" y="750" font-family="Georgia, serif" font-size="22" fill="#D4AF37" text-anchor="middle" font-weight="bold">PROGRAMAÇÃO</text>
  <text x="400" y="780" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Workshop &amp; Palestras Educacionais de Voz</text>
